name: Deploy

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Build and test both games
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: |
            client/package-lock.json
            server/package-lock.json
            kings-corner/client/package-lock.json
            kings-corner/server/package-lock.json
      - name: Install dependencies
        run: |
          npm ci --prefix client
          npm ci --prefix server
          npm ci --prefix kings-corner/client
          npm ci --prefix kings-corner/server
      - name: Build clients
        run: |
          npm run build --prefix client
          npm run build --prefix kings-corner/client
      - name: Test servers and King’s Corner UI
        run: |
          npm test --prefix server
          npm test --prefix kings-corner/server
          npm test --prefix kings-corner/client

  deploy:
    name: Deploy to VPS
    needs: verify
    if: github.event_name != 'pull_request'
    concurrency:
      group: production-deploy
      cancel-in-progress: true
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Validate required secrets
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
        run: |
          set -euo pipefail
          test -n "$VPS_HOST"
          test -n "$VPS_USER"
          test -n "$VPS_SSH_KEY"
          test -n "$VPS_APP_DIR"

      - name: Configure SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT || '22' }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s' "$VPS_SSH_KEY" \
            | sed 's/\\n/\n/g' \
            | tr -d '\r' \
            > ~/.ssh/badam_satti_deploy_key
          printf '\n' >> ~/.ssh/badam_satti_deploy_key
          chmod 600 ~/.ssh/badam_satti_deploy_key
          ssh-keygen -y -f ~/.ssh/badam_satti_deploy_key >/dev/null
          ssh-keyscan -p "$VPS_PORT" "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Deploy on VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT || '22' }}
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
        run: |
          set -euo pipefail
          REMOTE_APP_DIR="$(printf '%q' "$VPS_APP_DIR")"
          ssh \
            -i ~/.ssh/badam_satti_deploy_key \
            -p "$VPS_PORT" \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            "$VPS_USER@$VPS_HOST" \
            "cd $REMOTE_APP_DIR && git fetch origin && git reset --hard origin/master && ./scripts/deploy-vps.sh"
